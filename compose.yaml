services:
  nginx:
    image: nginx:1.27-alpine
    ports:
      - "${NGINX_PORT:-8080}:80"
    volumes:
      - ./backend:/var/www/backend:ro
      - ./docker/nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - php
    networks:
      - tutorflow

  php:
    build:
      context: ./backend
      dockerfile: Dockerfile
    volumes:
      - ./backend:/var/www/backend
    environment:
      APP_ENV: ${APP_ENV:-local}
      DB_HOST: postgres
      DB_PORT: 5432
      DB_DATABASE: ${POSTGRES_DB:-tutor_flow}
      DB_USERNAME: ${POSTGRES_USER:-tutor_flow}
      DB_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - tutorflow

  postgres:
    image: postgres:17-alpine
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-tutor_flow}
      POSTGRES_USER: ${POSTGRES_USER:-tutor_flow}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-secret}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-tutor_flow} -d ${POSTGRES_DB:-tutor_flow}"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tutorflow

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-5173}:5173"
    volumes:
      - ./frontend:/app
    command: sh -c "echo 'Frontend will be configured in TF-6' && tail -f /dev/null"
    networks:
      - tutorflow

volumes:
  postgres_data:

networks:
  tutorflow:
    driver: bridge